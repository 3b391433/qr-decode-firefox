name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Lint extension
        run: npm run lint

      # 非 tag：打包未签名版本，作为 CI 产物方便下载/调试
      - name: Build extension package (unsigned)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          npm run build
          shopt -s nullglob
          for f in web-ext-artifacts/*.zip; do
            mv "$f" "${f%.zip}.xpi"
          done
          ls -la web-ext-artifacts

      # 打 tag：向 AMO 申请签名 (unlisted，自行分发)，产出可在普通版 Firefox 永久安装的 .xpi
      - name: Sign extension (unlisted)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          npm run sign
          ls -la web-ext-artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-decode-firefox-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error

      - name: Attach signed .xpi to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: web-ext-artifacts/*.xpi
          generate_release_notes: true
